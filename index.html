<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icecrown Citadel - Guild Core</title>
<style>
body {
    margin: 0;
    padding: 20px;
    font-family: Georgia, serif;
    color: #e5d9a0;
    text-align: center;
    background: #0a0a0f;
}
.parallax {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 120%;
    z-index: -3;
    background-image: url('https://images.alphacoders.com/121/121966.jpg');
    background-size: cover;
    background-position: center;
}
.frame {
    max-width: 1300px;
    margin: 40px auto;
    padding: 30px;
    background: rgba(8, 12, 25, 0.95);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(80, 160, 255, 0.4);
}
h1 {
    font-size: 3.2em;
    letter-spacing: 6px;
    color: #80c8ff;
    text-shadow: 0 0 20px #3a9dff, 0 0 40px #1e5fb3;
    margin-bottom: 8px;
}
.subtitle {
    color: #a8d4ff;
    text-transform: uppercase;
    letter-spacing: 4px;
    font-size: 1.1em;
}
table {
    margin: 30px auto;
    width: 95%;
    border-collapse: collapse;
    background: rgba(15, 25, 45, 0.95);
    border: 1px solid #4a8cff;
}
th, td {
    border: 1px solid #2a5a99;
    padding: 14px 12px;
    text-align: left;
}
th {
    background: linear-gradient(#102a50, #08172f);
    color: #ffdd88;
}
.login-box {
    max-width: 480px;
    margin: 50px auto;
    padding: 40px;
    background: rgba(8,12,25,0.97);
    border: 2px solid #4a8cff;
    border-radius: 12px;
}
button {
    padding: 14px 28px;
    background: #1e3a6b;
    color: #a8d4ff;
    border: 1px solid #4a8cff;
    cursor: pointer;
    border-radius: 8px;
}
</style>
</head>
<body>
<div class="parallax"></div>

<div class="frame">
    <h1>ICECROWN CITADEL</h1>
    <div class="subtitle">CORE • ALTS • EPGP PRIORITY</div>

    <div id="passwordScreen" class="login-box">
        <h2 style="color:#80c8ff;">Character Authentication</h2>
        <p style="color:#a8d4ff;">Select your Main Character & Enter Password</p>
        
        <select id="charSelect" style="width:80%; padding:12px; margin:15px 0; background:#0f1f3a; color:#d0e0ff; border:1px solid #4a8cff;">
            <option value="">-- Select Main Character --</option>
            <!-- Todos os mains aqui -->
            <option>Pgr</option>
            <option>Upload</option>
            <option>Lothair</option>
            <option>Noctisumbra</option>
            <option>Shpicy</option>
            <option>Ardelle</option>
            <option>Slutbunny</option>
            <option>Icaru</option>
            <option>Emilade</option>
            <option>Euphemina</option>
            <option>Holybanyan</option>
            <option>Danspatanku</option>
            <option>Elsen</option>
            <option>Demonshroute</option>
            <option>Meiyla</option>
            <option>Serpentis</option>
            <option>Derbbin</option>
            <option>Salenlord</option>
            <option>Kibencis</option>
            <option>Zxdantexz</option>
            <option>Fenring</option>
            <option>Amiira</option>
            <option>Ilsdll</option>
            <option>Ktharsis</option>
            <option>Gavrilla</option>
            <option>Sekewar</option>
            <option>Nikandros</option>
            <option>Velithria</option>
            <option>Eddelle</option>
            <option>Belladudu</option>
        </select>
        <br><br>
        <input type="password" id="passInput" placeholder="Password" style="width:80%; padding:12px; background:#0f1f3a; color:#d0e0ff; border:1px solid #4a8cff;">
        <br><br>
        <button onclick="checkPassword()">Enter Icecrown</button>
        <div id="loginError" style="color:#ff6666; margin-top:15px;"></div>
    </div>

    <div id="content" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>Main</th>
                    <th>Pending List</th>
                    <th>EP / GP</th>
                    <th>Priority</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Linhas serão preenchidas aqui -->
            </tbody>
        </table>
    </div>
</div>

<script>
const data = [
    {main: "Upload", alt: "Dookman", epgp: "66800 / 5100"},
    {main: "Ardelle", alt: "Bowen", epgp: "26350 / 2300"},
    {main: "Lothair", alt: "Brynhiildr", epgp: "69400 / 9025"},
    {main: "Kibencis", alt: "Solanja", epgp: "73350 / 10250"},
    {main: "Velithria", alt: "Morvana", epgp: "36650 / 5250"},
    {main: "Fenring", alt: "Chani", epgp: "68250 / 10300"},
    {main: "Belladudu", alt: "Magicbelle", epgp: "38650 / 8751"},
    {main: "Pgr", alt: "", epgp: ""},
    {main: "Noctisumbra", alt: "", epgp: ""},
    {main: "Shpicy", alt: "", epgp: ""},
    {main: "Slutbunny", alt: "", epgp: ""},
    {main: "Icaru", alt: "", epgp: ""},
    {main: "Emilade", alt: "", epgp: ""},
    {main: "Euphemina", alt: "", epgp: ""},
    {main: "Holybanyan", alt: "", epgp: ""},
    {main: "Danspatanku", alt: "", epgp: ""},
    {main: "Elsen", alt: "", epgp: ""},
    {main: "Demonshroute", alt: "", epgp: ""},
    {main: "Meiyla", alt: "", epgp: ""},
    {main: "Serpentis", alt: "", epgp: ""},
    {main: "Derbbin", alt: "", epgp: ""},
    {main: "Salenlord", alt: "", epgp: ""},
    {main: "Zxdantexz", alt: "", epgp: ""},
    {main: "Amiira", alt: "", epgp: ""},
    {main: "Ilsdll", alt: "", epgp: ""},
    {main: "Ktharsis", alt: "", epgp: ""},
    {main: "Gavrilla", alt: "", epgp: ""},
    {main: "Sekewar", alt: "", epgp: ""},
    {main: "Nikandros", alt: "", epgp: ""},
    {main: "Eddelle", alt: "", epgp: ""}
];

function loadTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${row.main}</td>
            <td>${row.alt}</td>
            <td>${row.epgp}</td>
            <td class="priority"></td>
        `;
        tbody.appendChild(tr);
    });
    calculatePriorities();
}

function calculatePriorities() {
    document.querySelectorAll("tbody tr").forEach(tr => {
        const epgpCell = tr.cells[2];
        const priorityCell = tr.cells[3];
        if (epgpCell && epgpCell.textContent.includes("/")) {
            const [ep, gp] = epgpCell.textContent.split("/").map(n => parseFloat(n.trim()));
            if (!isNaN(ep) && !isNaN(gp)) {
                const prio = (ep / gp).toFixed(2);
                priorityCell.textContent = prio;
            }
        }
    });
}

function checkPassword(){
    const pass = document.getElementById("passInput").value;
    const error = document.getElementById("loginError");

    if(pass === "guild123"){
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("content").style.display = "block";
        loadTable();
    } else {
        error.textContent = "Incorrect Password";
    }
}
</script>
</body>
</html>
